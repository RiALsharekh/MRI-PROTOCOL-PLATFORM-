leration,pf,phaseFovRatio),quality=clamp((snr*.38)+(resolutionScore*.32)+((100-artifactRisk)*.2)+(timeScore*.1),0,100),weighting=te>80&&effectiveTR>2500?"T2 dominant":te<30&&effectiveTR<900?"T1 dominant":effectiveTR>7000&&seq.contrast.ti>1500?"FLAIR-like":"Mixed/PD-like";return{effectiveTR,minTR,timeSeconds,voxelX,voxelY,voxelZ,voxelVolume,snr,resolutionScore,artifactRisk,quality,weighting,effectivePhaseLines,phaseFovRatio}};

if(tab==="advanced")main=summary("Advanced Summary",[["Family",s.type],["Mode",s.type.includes("3D")?"3D acquisition":s.type==="EPI"?"EPI readout":"2D acquisition"],["Extra controls","Sequence-specific"]])+advField("Field Strength","fieldStrength","T")+advField("Phase Oversampling","phaseOversampling","%")+advField("Slice Oversampling","sliceOversampling","%")+advField("Fat Suppression","fatSuppression","",["None","FatSat","STIR","SPAIR","Dixon"])+advField("Distortion Correction","distortionCorrection","",["Off","On","Advanced"]);
if(tab==="signals")main=summary("Tissue Signal Engine",[["WM / GM",Math.abs(signals.WM-signals.GM).toFixed(1)],["GM / CSF",Math.abs(signals.GM-signals.CSF).toFixed(1)],["Fat / Muscle",Math.abs(signals.Fat-signals.Muscle).toFixed(1)]])+Object.entries(signals).map(([k,v])=>bar(k,v)).join("");
document.getElementById("root").innerHTML=`<div class="app"><div class="top"><div><div class="title">MRI Protocol Engineering Platform</div><div class="subtitle">iPad standalone · no CDN · Phase 1.3 Lite</div></div><div class="metrics"><div class="metric"><div class="k">Exam Time</div><div class="v">${formatTime(protocolSeconds)}</div></div><div class="metric"><div class="k">Quality</div><div class="v">${Math.round(m.quality)}/100</div></div><div class="metric"><div class="k">SNR</div><div class="v">${Math.round(m.snr)}/100</div></div><div class="metric"><div class="k">Warnings</div><div class="v">${ws.length}</div></div></div></div><div class="grid"><div class="card"><div class="section-title">Protocols</div>${state.protocols.map(x=>`<button class="item ${x.id===p.id?"active":""}" onclick="state.protocolId='${x.id}';state.sequenceId='${x.sequences[0].id}';render()"><b>${x.name}</b><div class="small">${x.bodyPart} · ${x.sequences.length} sequences</div></button>`).join("")}</div><div class="card"><div class="section-title">Sequence Tree</div><select class="preset" onchange="applyPreset(this.value)"><option value="">Apply ready sequence...</option>${readySequences.map(x=>`<option>${x.name}</option>`).join("")}</select><br><br>${p.sequences.map((x,i)=>{const mx=calc(x);return `<button class="item ${x.id===s.id?"active":""}" onclick="state.sequenceId='${x.id}';render()"><b>${i+1}. ${x.name}</b><div class="small">${x.type} · ${x.geometry.orientation} · ${formatTime(mx.timeSeconds)}</div></button>`}).join("")}<div class="row2"><button class="btn cyan" onclick="addSeq()">+ Add</button><button class="btn" onclick="copySeq()">Copy</button></div></div><div class="card"><div class="seq-head"><input value="${s.name}" onchange="getSequence().name=this.value;render()"/><span class="badge">${s.type}</span></div><div class="tabs">${["contrast","resolution","geometry","acceleration","advanced","signals"].map(t=>`<button class="tab ${tab===t?"active":""}" onclick="state.activeTab='${t}';render()">${t}</button>`).join("")}</div>${main}</div><div class="card"><div class="section-title">Live Analysis</div>${bar("SNR",m.snr)}${bar("Resolution",m.resolutionScore)}${bar("Artifact Safety",100-m.artifactRisk)}${bar("Quality",m.quality)}<div class="row2"><div class="metric"><div class="k">Sequence Time</div><div class="v">${formatTime(m.timeSeconds)}</div></div><div class="metric"><div class="k">Voxel Volume</div><div class="v">${m.voxelVolume.toFixed(2)}</div></div></div><br><div class="section-title">Warnings</div>${ws.length?ws.map(w=>`<div class="warn">${w}</div>`).join(""):`<div class="ok">No active warnings.</div>`}<br><div class="section-title">Artifact Risk</div>${arts.map(a=>`<div class="artifact"><div class="artifact-head"><span>${a.name}</span><span class="risk ${a.risk>65?"high":a.risk>35?"mod":"low"}">${Math.round(a.risk)}%</span></div>${bar("Risk",a.risk)}<div class="muted">Cause: ${a.reason}</div><div class="muted">Fix: ${a.fix}</div></div>`).join("")}<br><div class="section-title">Protocol Timeline</div>${p.sequences.map((x,i)=>{const tx=calc(x),pct=protocolSeconds?clamp(tx.timeSeconds/protocolSeconds*100,4,100):0;return `<div class="timeline-item"><div class="tl-top"><span>${i+1}. ${x.name}</span><span>${formatTime(tx.timeSeconds)}</span></div><div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div></div>`}).join("")}</div></div></div>`}
function applyPreset(name){const preset=readySequences.find(x=>x.name===name);if(!preset)return;const s=getSequence();s.name=preset.name;s.type=preset.type;s.contrast={...s.contrast,...preset.contrast};render()}
function addSeq(){const p=getProtocol();const n=JSON.parse(JSON.stringify(defaultSequence));n.id="seq-"+Date.now();n.name="New Sequence";p.sequences.push(n);state.sequenceId=n.id;render()}
function copySeq(){const p=getProtocol();const n=JSON.parse(JSON.stringify(getSequence()));n.id="seq-"+Date.now();n.name=n.name+" Copy";p.sequences.push(n);state.sequenceId=n.id;render()}
document.addEventListener("change",e=>{const s=getSequence();if(e.target.closest(".field")){s.geometry.readDirection=autoRead(s.geometry.orientation,s.geometry.phaseDirection)}});
render();
</script>
</body>
</html>
